[pytest]
# Run tests in conda env scidata: ./scripts/run_pytest.sh  (see TESTING.md)
pythonpath = . ChemDB ChemDB/src
testpaths = tests
markers =
    integration: real subprocess with minimal fixtures (requires RDKit)
    integration_1pct: parent marker for Tier A/B 1pct tests (excludes enhanced; see integration_data/README.md)
    integration_1pct_tier_a: 1pct init-run + real step1 + step2
    integration_1pct_tier_b: 1pct run-pipeline through step4_5
    integration_1pct_tier_c: optional 1pct run-pipeline through step6_7
    integration_1pct_enhanced: optional step8/12/13 on 1pct data (NOT Phase 1B minimum; do not combine with bare integration_1pct runs)
    integration_embedding: real ECFP build + real zscore under run_root only
    integration_training_data: real training.data under run_root/training only
    integration_training_train: real training.train cpu epochs=1 under run_root/training/ckpts only
    integration_model_after_rank: real run_demo best.pt ranking under tmp output_dir only
    integration_model_after_eval: real run_demo best.pt metrics under tmp output_dir only
    integration_model_after_models: real multi model_run_root selection under tmp output_dir only
